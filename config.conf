# InstaMonitor Configuration File
# =================================

# Network Interface
# -----------------
# Interface to monitor (usually br-lan for LAN bridge)
CAPTURE_INTERFACE=br-lan

# IP Address Lists
# ----------------
# Files containing IP ranges for social media platforms
INSTAGRAM_IPS=/etc/instamonitor/instagram_ips.txt
TIKTOK_IPS=/etc/instamonitor/tiktok_ips.txt

# Traffic Classification Thresholds
# ----------------------------------
# Chat: Small packets, bidirectional, sporadic
CHAT_PACKET_SIZE_MAX=500
CHAT_MIN_PACKETS_PER_SEC=2
CHAT_MAX_PACKETS_PER_SEC=20

# Video Conference: Medium packets, consistent bidirectional flow
VIDEO_CONF_MIN_SIZE=500
VIDEO_CONF_MAX_SIZE=1500
VIDEO_CONF_MIN_PACKETS_PER_SEC=10
VIDEO_CONF_BIDIRECTIONAL_RATIO=0.3  # At least 30% traffic in both directions

# Video Scrolling: Large packets, mostly download, bursty
SCROLL_MIN_AVG_SIZE=1500
SCROLL_DOWNLOAD_RATIO=0.8  # At least 80% download traffic
SCROLL_BURST_THRESHOLD=5  # 5x average packet rate

# Capture Settings
# ----------------
# Snapshot length (bytes to capture per packet)
# 96 bytes is enough for Ethernet + IP + TCP/UDP headers
SNAPSHOT_LENGTH=96

# Packet buffer size (packets)
BUFFER_SIZE=10000

# Analysis interval (seconds)
ANALYSIS_INTERVAL=10

# Data Storage Settings
# ---------------------
DATA_DIR=/var/lib/instamonitor
MAX_STORAGE_MB=100
AUTO_CLEANUP_ENABLED=true

# Logging
# -------
LOG_LEVEL=INFO  # DEBUG, INFO, WARNING, ERROR
LOG_PATH=/var/log/instamonitor.log
LOG_MAX_SIZE_MB=10

# Performance Tuning
# ------------------
# Maximum CPU usage percentage (will throttle if exceeded)
MAX_CPU_PERCENT=25

# Processing batch size
BATCH_SIZE=100

# Enable/disable features
ENABLE_REAL_TIME_STATS=true
ENABLE_DEVICE_TRACKING=true
ENABLE_HOURLY_SUMMARIES=true
