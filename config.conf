# InstaMonitor Configuration File
# =================================

# Network Interface
# -----------------
# Interface to monitor (usually br-lan for LAN bridge)
CAPTURE_INTERFACE=br-lan

# Device(s) to Monitor
# --------------------
# Space-separated LAN IP(s) of the phone(s) to monitor. Everything these
# devices do on 443 is captured; the analyzer resolves each remote IP's owner
# on the fly and the classifier separates target vs background flows.
DEVICE_IPS=192.168.1.100

# On-the-fly IP Ownership Resolution
# ----------------------------------
# Resolve each remote IP's owner at runtime (reverse DNS, optionally whois) and:
#   * tag flows with their platform (instagram / tiktok), and
#   * drop flows that are CONFIRMED to belong to an unrelated service.
# Ambiguous/unknown IPs are always KEPT (we could not prove they are unrelated).
# Each distinct IP is resolved once and cached, so router load stays low.
IP_FILTER_ENABLED=true
# Drop flows whose remote IP is confirmed NOT Instagram/TikTok (e.g. YouTube,
# Netflix, Apple, Windows Update, WhatsApp). Set false to keep everything.
DROP_CONFIRMED_OTHER=true
# Also consult whois when reverse DNS is inconclusive (needs 'whois' installed).
# Slower but better at spotting ByteDance/TikTok CDN ranges. Off by default.
IP_FILTER_USE_WHOIS=false
# Persistent cache of resolved IP ownership (relative to this file's dir).
IP_OWNERSHIP_CACHE=data/ip_ownership.csv

# Machine-Learning Classification
# -------------------------------
# Trained model exported by train.py (on your laptop) and copied here.
# Relative paths are resolved against the directory containing this file.
# If the file is absent, the analyzer falls back to a simple heuristic.
MODEL_PATH=model.json
# Minimum prediction confidence; below this a flow is labeled "unknown"
# instead of being forced into a known class (handles background traffic).
CONFIDENCE_THRESHOLD=0.6
# Flows with fewer packets than this are ignored (too little signal).
MIN_FLOW_PACKETS=5
# A flow is considered finished (and recorded) after this many idle seconds.
FLOW_TIMEOUT=60

# Capture Settings
# ----------------
# Snapshot length (bytes to capture per packet)
# 96 bytes is enough for Ethernet + IP + TCP/UDP headers
SNAPSHOT_LENGTH=96

# Directory for the temporary packet log written by capture.sh.
# Relative paths are resolved against the directory containing this file.
OUTPUT_DIR=data

# Packet buffer size (packets)
BUFFER_SIZE=10000

# Analysis interval (seconds)
ANALYSIS_INTERVAL=10

# Data Storage Settings
# ---------------------
# Directory for the CSV data files.
# Relative paths are resolved against the directory containing this file.
DATA_DIR=data
MAX_STORAGE_MB=100
AUTO_CLEANUP_ENABLED=true

# Logging
# -------
LOG_LEVEL=INFO  # DEBUG, INFO, WARNING, ERROR
LOG_PATH=data/instamonitor.log
LOG_MAX_SIZE_MB=10

# Performance Tuning
# ------------------
# Maximum CPU usage percentage (will throttle if exceeded)
MAX_CPU_PERCENT=25

# Processing batch size
BATCH_SIZE=100

# Enable/disable features
ENABLE_REAL_TIME_STATS=true
ENABLE_DEVICE_TRACKING=true
ENABLE_HOURLY_SUMMARIES=true
